<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>বিশেষ বার্তা</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; }
        .container { border: 2px solid #ccc; padding: 20px; width: 80%; max-width: 400px; text-align: center; border-radius: 10px; }
        textarea { width: 100%; height: 80px; margin: 15px 0; padding: 10px; box-sizing: border-box; }
        button { padding: 10px 20px; cursor: pointer; background-color: #28a745; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container">
    <p>তোমার লিংক ডিভাইসে গিয়ে হোয়াটসঅ্যাপের নাম সেভ কর, দেখো লাল শাড়ি পরা ছবি আসবে।</p>
    <textarea id="myText">এখানে আপনার গোপন লেখাটি লিখুন</textarea>
    <br>
    <button onclick="copyText()">লেখাটি কপি করুন</button>
</div>

<script>
    function copyText() {
        var copyText = document.getElementById("myText");
        copyText.select();
        document.execCommand("copy");
        alert("কপি হয়েছে!");
    }
</script>

</body>
</html>
